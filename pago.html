<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>Resultado del pago · Focus Store</title>
<!-- Página de confirmación post-pago: destino del `redirect` de Tilopay (integración WhatsApp).
     Tilopay redirige con GET: ?code=1&description=...&order=WA-0009&auth=...&tpt=...
     code=1 → aprobado; otro → rechazado. Solo muestra estado: la confirmación REAL del
     pedido la hace el backend (cron + /consult). Vive aquí (GitHub Pages) porque Supabase
     bloquea servir HTML desde *.supabase.co (anti-phishing). -->
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f1220;font-family:'Segoe UI',Arial,sans-serif}
  .card{max-width:420px;margin:24px;background:#fff;border-radius:16px;padding:36px 32px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .icono{font-size:64px;line-height:1}
  h1{font-size:22px;color:#111827;margin:18px 0 10px}
  p.detalle{font-size:15px;color:#4b5563;line-height:1.5;margin:0 0 24px}
  a.wa{display:block;background:#22c55e;color:#fff;text-decoration:none;font-weight:700;padding:14px;border-radius:10px;font-size:15px}
  p.cierre{font-size:12px;color:#9ca3af;margin:18px 0 0}
  p.pie{font-size:11px;color:#c7cad1;margin:14px 0 0}
</style>
</head>
<body>
  <div class="card">
    <div class="icono" id="icono">⏳</div>
    <h1 id="titulo">Verificando el pago…</h1>
    <p class="detalle" id="detalle"></p>
    <a class="wa" href="https://wa.me/50488322245">💬 Volver al chat de WhatsApp</a>
    <p class="cierre" id="cierre"></p>
    <p class="pie">Focus Store · Pago procesado por Tilopay</p>
  </div>
  <script>
    const q = new URLSearchParams(location.search);
    const code = q.get('code') || '';
    const orden = (q.get('order') || q.get('orderNumber') || '').replace(/[^\w-]/g, '').slice(0, 30);
    const aprobado = code === '1';

    document.getElementById('icono').textContent = aprobado ? '✅' : '❌';
    document.getElementById('titulo').textContent = aprobado ? '¡Pago procesado correctamente!' : 'El pago no se completó';
    document.getElementById('detalle').innerHTML = aprobado
      ? (orden ? 'Tu orden <b>' + orden + '</b> quedó confirmada. ' : '') +
        'En unos minutos recibirás la confirmación por WhatsApp y nuestro equipo te dará seguimiento. ¡Gracias por comprar en Focus Store! 📸'
      : 'Tu tarjeta no fue procesada' + (orden ? ' para la orden <b>' + orden + '</b>' : '') +
        '. No se realizó ningún cargo. Podés intentar de nuevo con el mismo link de pago, o escribinos por WhatsApp y te ayudamos.';

    let s = 6;
    const cierre = document.getElementById('cierre');
    cierre.innerHTML = 'Esta ventana intentará cerrarse en <span id="seg">6</span> segundos… también podés cerrarla vos.';
    const t = setInterval(() => {
      s--;
      const el = document.getElementById('seg');
      if (el) el.textContent = s;
      if (s <= 0) {
        clearInterval(t);
        window.close();
        setTimeout(() => { cierre.textContent = 'Podés cerrar esta ventana cuando querás 👋'; }, 400);
      }
    }, 1000);
  </script>
</body>
</html>
